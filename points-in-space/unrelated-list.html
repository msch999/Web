<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Channels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            padding: 2rem;
            min-height: 100vh;
        }

        .top-bar {
            max-width: 1200px;
            margin: 0 auto 2rem auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(135deg, #e3b305, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            margin: 0;
            font-size: 0.9rem;
            display: flex;
            gap: 1rem;
        }

        .nav-links a {
            color: rgba(227, 179, 5, 0.8);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #ffed4e;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .sort-buttons {
            display: flex;
            gap: 0.5rem;
        }

        button {
            background: rgba(227, 179, 5, 0.2);
            border: 1px solid rgba(227, 179, 5, 0.5);
            color: #e3b305;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(227, 179, 5, 0.4);
            border-color: #e3b305;
            transform: translateY(-2px);
        }

        button.active {
            background: rgba(227, 179, 5, 0.6);
            border-color: #ffed4e;
            color: #ffed4e;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(227, 179, 5, 0.3);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.95rem;
        }

        .search-box input::placeholder {
            color: rgba(224, 224, 224, 0.5);
        }

        .search-box input:focus {
            outline: none;
            border-color: #e3b305;
            box-shadow: 0 0 10px rgba(227, 179, 5, 0.3);
        }

        .tag-filter {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag-btn {
            background: rgba(100, 180, 255, 0.2);
            border: 1px solid rgba(100, 180, 255, 0.5);
            color: #64b4ff;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .tag-btn:hover {
            background: rgba(100, 180, 255, 0.3);
        }

        .tag-btn.active {
            background: rgba(100, 180, 255, 0.6);
            border-color: #64b4ff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .channel-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(227, 179, 5, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .channel-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(227, 179, 5, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .channel-card:hover::before {
            left: 100%;
        }

        .channel-card:hover {
            background: rgba(227, 179, 5, 0.1);
            border-color: rgba(227, 179, 5, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(227, 179, 5, 0.2);
        }

        .channel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.8rem;
        }

        .channel-name {
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: capitalize;
            color: #ffed4e;
            text-decoration: none;
            transition: color 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .channel-name:hover {
            color: #ffff00;
            text-decoration: underline;
        }

        .channel-id {
            color: rgba(224, 224, 224, 0.7);
            font-size: 0.85rem;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .channel-actions {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.9rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .fav-btn {
            background: none;
            border: 1px solid rgba(255, 100, 100, 0.5);
            color: #ff6464;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            flex: 1;
        }

        .fav-btn:hover {
            background: rgba(255, 100, 100, 0.1);
            border-color: #ff6464;
        }

        .fav-btn.favorited {
            background: rgba(255, 100, 100, 0.3);
            color: #ff8080;
        }

        .channel-link {
            background: rgba(100, 180, 255, 0.2);
            border: 1px solid rgba(100, 180, 255, 0.5);
            color: #64b4ff;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            text-align: center;
            transition: all 0.3s ease;
            flex: 1;
            display: inline-block;
        }

        .channel-link:hover {
            background: rgba(100, 180, 255, 0.4);
            border-color: #64b4ff;
        }

        .nav-links {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .nav-links a {
            color: rgba(227, 179, 5, 0.8);
            text-decoration: none;
            margin: 0 1rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #ffed4e;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: rgba(224, 224, 224, 0.6);
            font-size: 1.1rem;
        }

        .edit-actions {
            display: flex;
            gap: 0.5rem;
        }

        .edit-btn, .delete-btn {
            background: none;
            border: 1px solid rgba(150, 150, 255, 0.5);
            color: #9696ff;
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }

        .edit-btn:hover {
            background: rgba(150, 150, 255, 0.1);
            border-color: #9696ff;
        }

        .delete-btn {
            border-color: rgba(255, 100, 100, 0.5);
            color: #ff6464;
        }

        .delete-btn:hover {
            background: rgba(255, 100, 100, 0.1);
            border-color: #ff6464;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border: 2px solid rgba(227, 179, 5, 0.5);
            border-radius: 12px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-content h2 {
            margin-bottom: 1.5rem;
            color: #ffed4e;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #e3b305;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(227, 179, 5, 0.3);
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.95rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e3b305;
            box-shadow: 0 0 8px rgba(227, 179, 5, 0.3);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .modal-actions button {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            border: none;
            transition: all 0.3s ease;
        }

        .modal-actions .save-btn {
            background: rgba(100, 180, 255, 0.3);
            border: 1px solid rgba(100, 180, 255, 0.6);
            color: #64b4ff;
        }

        .modal-actions .save-btn:hover {
            background: rgba(100, 180, 255, 0.5);
            border-color: #64b4ff;
        }

        .modal-actions .cancel-btn {
            background: rgba(150, 150, 150, 0.2);
            border: 1px solid rgba(150, 150, 150, 0.5);
            color: #b0b0b0;
        }

        .modal-actions .cancel-btn:hover {
            background: rgba(150, 150, 150, 0.3);
            border-color: #b0b0b0;
        }

        .add-channel-btn {
            background: rgba(100, 200, 100, 0.3);
            border: 1px solid rgba(100, 200, 100, 0.6);
            color: #64c864;
        }

        .add-channel-btn:hover {
            background: rgba(100, 200, 100, 0.5);
            border-color: #64c864;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .sort-buttons {
                flex-wrap: wrap;
            }

            .modal-content {
                width: 95%;
            }
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <div class="header"><h1>📺 TV Channels</h1></div>
        <div class="nav-links">
            <a href="https://www.joyn.de/">» joyn.de</a>
            <a href="../index.html">« back</a>
        </div>
    </div>

    <div class="container">
        <div class="controls">
            <div class="sort-buttons">
                <button id="sortName" class="active">Sort by Name</button>
                <button id="sortId">Sort by ID</button>
                <button id="sortFav">★ Favorites</button>
                <button id="addChannelBtn" class="add-channel-btn">+ Add Channel</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search channels...">
            </div>
        </div>

        <div class="channels-grid" id="channelsGrid">
            <!-- Channels will be inserted here -->
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2 id="modalTitle">Add Channel</h2>
            <form id="editForm">
                <div class="form-group">
                    <label for="channelName">Channel Name</label>
                    <input type="text" id="channelName" placeholder="e.g., BBC One" required>
                </div>
                <div class="form-group">
                    <label for="channelId">Channel ID</label>
                    <input type="number" id="channelId" placeholder="e.g., 1234" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" id="cancelBtn">Cancel</button>
                    <button type="submit" class="save-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const defaultChannels = [
            { name: '3sat', id: '1006' },
            { name: 'arte', id: '1007' },
            { name: 'ard-alpha', id: '169' },
            { name: 'bbc-history', id: '1265' },
            { name: 'cnbc', id: '1010' },
            { name: 'cnn-international-hd', id: '1147' },
            { name: 'comedy-central', id: '130' },
            { name: 'dmax', id: '110' },
            { name: 'deluxe-music', id: '127' },
            { name: 'das-erste', id: '165' },
            { name: 'euronews', id: '1090' },
            { name: 'eurosport1', id: '122' },
            { name: 'kabel-eins', id: '3' },
            { name: 'kabel-eins-doku', id: '7' },
            { name: 'kika', id: '173' },
            { name: 'n24-doku', id: '114' },
            { name: 'odc-anime', id: '99059' },
            { name: 'phoenix', id: '172' },
            { name: 'prosieben', id: '1' },
            { name: 'prosiebenmaxx-de', id: '5' },
            { name: 'rbb', id: '1280' },
            { name: 'red-bull-tv', id: '1027' },
            { name: 'sat1', id: '2' },
            { name: 'sixx', id: '4' },
            { name: 'tagesschau-24', id: '167' },
            { name: 'tele-5', id: '1026' },
            { name: 'tlc', id: '111' },
            { name: 'wedotv-sports-hd', id: '1129' },
            { name: 'welt', id: '113' },
            { name: 'zdf', id: '123' },
            { name: 'zdf-info', id: '124' },
            { name: 'sat1-audiodesc-movies', id: '1142' }
        ];

        let channels = JSON.parse(localStorage.getItem('tvChannels')) || defaultChannels;
        let favorites = JSON.parse(localStorage.getItem('tvFavorites')) || [];
        let currentSort = 'name';
        let searchQuery = '';
        let editingIndex = -1;

        const directLinkUrl = "https://www.joyn.de/play/live-tv?channel_id=";
        const channelUrlBase = "https://www.joyn.de/live-tv/";

        function saveChannels() {
            localStorage.setItem('tvChannels', JSON.stringify(channels));
        }

        function openAddModal() {
            editingIndex = -1;
            document.getElementById('modalTitle').textContent = 'Add Channel';
            document.getElementById('editForm').reset();
            document.getElementById('editModal').classList.add('active');
        }

        function openEditModal(index) {
            editingIndex = index;
            document.getElementById('modalTitle').textContent = 'Edit Channel';
            document.getElementById('channelName').value = channels[index].name;
            document.getElementById('channelId').value = channels[index].id;
            document.getElementById('editModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
            editingIndex = -1;
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('channelName').value.trim();
            const id = document.getElementById('channelId').value.trim();

            if (!name || !id) return;

            if (editingIndex === -1) {
                channels.push({ name, id });
            } else {
                channels[editingIndex] = { name, id };
            }

            saveChannels();
            closeModal();
            renderChannels();
        }

        function deleteChannel(index) {
            if (confirm('Delete this channel?')) {
                channels.splice(index, 1);
                saveChannels();
                renderChannels();
            }
        }

        function renderChannels() {
            const grid = document.getElementById('channelsGrid');
            grid.innerHTML = '';

            let filtered = channels.filter(ch =>
                ch.name.toLowerCase().includes(searchQuery.toLowerCase())
            );

            if (currentSort === 'favorite') {
                filtered = filtered.filter(ch => favorites.includes(ch.id));
            }

            let sorted = [...filtered];
            if (currentSort === 'name') {
                sorted.sort((a, b) => a.name.localeCompare(b.name));
            } else if (currentSort === 'id') {
                sorted.sort((a, b) => parseInt(a.id) - parseInt(b.id));
            } else if (currentSort === 'favorite') {
                sorted.sort((a, b) => {
                    const aFav = favorites.includes(a.id);
                    const bFav = favorites.includes(b.id);
                    return bFav - aFav;
                });
            }

            if (sorted.length === 0) {
                grid.innerHTML = '<div class="no-results">No channels found</div>';
                return;
            }

            sorted.forEach((channel, displayIndex) => {
                const actualIndex = channels.indexOf(channel);
                const isFav = favorites.includes(channel.id);
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <div class="channel-header">
                        <a href="${channelUrlBase}${channel.name}" class="channel-name" target="_blank">${channel.name}</a>
                        <div class="channel-id">ID: ${channel.id}</div>
                    </div>
                    <div class="channel-actions">
                        <button class="fav-btn ${isFav ? 'favorited' : ''}" data-id="${channel.id}">
                            ${isFav ? '★ Fav' : '☆ Add'}
                        </button>
                        <button class="edit-btn" data-index="${actualIndex}">✎ </button>
                        <button class="delete-btn" data-index="${actualIndex}">✕ </button>
                        <a href="${directLinkUrl}${channel.id}" class="channel-link" target="_blank">Watch →</a>
                    </div>
                `;

                card.querySelector('.fav-btn').addEventListener('click', (e) => {
                    e.preventDefault();
                    toggleFavorite(channel.id);
                });

                card.querySelector('.edit-btn').addEventListener('click', () => {
                    openEditModal(actualIndex);
                });

                card.querySelector('.delete-btn').addEventListener('click', () => {
                    deleteChannel(actualIndex);
                });

                grid.appendChild(card);
            });
        }

        function toggleFavorite(id) {
            const idx = favorites.indexOf(id);
            if (idx === -1) {
                favorites.push(id);
            } else {
                favorites.splice(idx, 1);
            }
            localStorage.setItem('tvFavorites', JSON.stringify(favorites));
            renderChannels();
        }

        document.getElementById('sortName').addEventListener('click', function() {
            currentSort = 'name';
            updateSortButtons();
            renderChannels();
        });

        document.getElementById('sortId').addEventListener('click', function() {
            currentSort = 'id';
            updateSortButtons();
            renderChannels();
        });

        document.getElementById('sortFav').addEventListener('click', function() {
            currentSort = 'favorite';
            updateSortButtons();
            renderChannels();
        });

        document.getElementById('searchInput').addEventListener('input', function(e) {
            searchQuery = e.target.value;
            renderChannels();
        });

        document.getElementById('addChannelBtn').addEventListener('click', openAddModal);
        document.getElementById('cancelBtn').addEventListener('click', closeModal);
        document.getElementById('editForm').addEventListener('submit', handleFormSubmit);

        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        function updateSortButtons() {
            document.querySelectorAll('.sort-buttons button').forEach(btn => {
                btn.classList.remove('active');
            });
            if (currentSort === 'name') document.getElementById('sortName').classList.add('active');
            if (currentSort === 'id') document.getElementById('sortId').classList.add('active');
            if (currentSort === 'favorite') document.getElementById('sortFav').classList.add('active');
        }

        renderChannels();
    </script>
</body>

</html>
